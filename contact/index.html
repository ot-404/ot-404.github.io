  <main>
    
      
    

    
<section class="section container narrow">
  <p class="eyebrow">Say hello</p>
  <h1 class="page-title">Get in touch</h1>
  <p class="lead">
    Have a project in mind or just want to connect? Drop me a message
    or email <a href="mailto:opshokare@gmail.com">opshokare@gmail.com</a>.
  </p>

  <form class="contact-form" method="POST" action="https://formsubmit.co/opshokare@gmail.com">
      <input type="hidden" name="_subject" value="New portfolio contact message" />
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_template" value="table" />
      <input type="hidden" name="_next" value="https://ot-404.github.io/contact/" />
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required autocomplete="name" />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" />
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send message</button>
  </form>
</section>
